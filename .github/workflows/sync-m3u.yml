name: Sync IPTV submodule and patch M3U

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  sync-and-patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository + submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update submodule from upstream
        run: |
          cd jp-iptv-reaperc

          git fetch origin

          BRANCH=$(git branch --show-current)

          git pull --rebase origin "$BRANCH" || \
          git pull --rebase origin main || \
          git pull --rebase origin master

      - name: Patch M3U files inside submodule
        run: |
          find jp-iptv-reaperc -type f -name "*.m3u" | while read file; do
            perl -0777 -i -pe \
            's/(?<=(\nhttp(?!.*\|user-agent=VLC).+))\n/|user-agent=VLC\n/g' \
            "$file"
          done

      - name: Commit submodule changes
        run: |
          cd jp-iptv-reaperc

          git add .

          if ! git diff --cached --quiet; then
            git commit -m "Add VLC user-agent to M3U streams"
            git push origin HEAD
          fi

      - name: Commit updated submodule pointer
        run: |
          cd ..

          git add jp-iptv-reaperc

          if ! git diff --cached --quiet; then
            git commit -m "Update jp-iptv-reaperc submodule"
            git push origin HEAD
          fi