name: Sync IPTV submodule and patch M3U

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  sync-and-patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository + submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update submodule from upstream
        run: |
          cd jp-iptv-reaperc

          git fetch origin

          BRANCH=$(git branch --show-current)

          git pull --rebase origin "$BRANCH" || \
          git pull --rebase origin main || \
          git pull --rebase origin master

      - name: Create output directory
        run: |
          mkdir -p out

      - name: Copy and patch M3U files
        run: |
          find jp-iptv-reaperc -type f -name "*.m3u" | while read file; do
            rel="${file#jp-iptv-reaperc/}"
            out="out/$rel"

            mkdir -p "$(dirname "$out")"

            perl -0777 -pe \
            's#(\nhttp(?![^\n]*\|user-agent=VLC)[^\n]*)\n#$1|user-agent=VLC\n#g' \
            "$file" > "$out"
          done

      - name: Commit generated playlists
        run: |
          git add out

          if ! git diff --cached --quiet; then
            git commit -m "Update generated IPTV playlists"
            git push origin HEAD
          fi